<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  @font-face {
    font-family: Circular;
    src: url(./Font/Circular-Book.woff.ttf) format("truetype");
  }
  *{
    --dark-green: #004F24;
    --light-green: #b4fc42;
  }

  body{
    background-color: var(--dark-green);
    color: var(--light-green);
    font-family: Circular, sans-serif;
    height: 100vh;
    /* width: 100vw; */
    margin: 28px;
    font-size: 30px;
  }

  a{
    color: var(--light-green);
    text-decoration: none;
    /* text-underline-offset: 5px;
    text-decoration-thickness: 2.5px; */
  }

  .nav{
    display: flex;
    flex-direction: row;
    justify-content: space-between;
  }

  

  video{
    width: 95%;
    height: auto;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  @media (width > 1000px) {
    video {
      width: 70%;
    }
  }
  @media (width < 500px) {
    body{
      font-size: 20px;
    }
  }
</style>
<body>
  <div class="nav">
    <span class="title">Here: Trailer</span>
    <a href="./index.html">Back: Home</a>
    
  </div>
  <video controls>
    <source src="./Assets/Trailer.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</body>
</html>
